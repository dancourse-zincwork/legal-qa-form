<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Spec Coach</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .container { width: 100%; max-width: 680px; height: 100vh; display: flex; flex-direction: column; background: #fff; }
  .header { padding: 16px 20px; border-bottom: 1px solid #e5e5e5; background: #1a1a2e; color: #fff; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header p { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #1a1a2e; color: #fff; border-bottom-right-radius: 4px; }
  .msg.agent { align-self: flex-start; background: #f0f0f0; color: #222; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; background: transparent; color: #999; font-size: 12px; font-style: italic; }
  .typing { align-self: flex-start; background: #f0f0f0; border-radius: 12px; border-bottom-left-radius: 4px; padding: 12px 16px; }
  .typing span { display: inline-block; width: 6px; height: 6px; background: #999; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1.2); opacity: 1; } }
  .input-area { padding: 12px 16px; border-top: 1px solid #e5e5e5; display: flex; gap: 8px; background: #fff; }
  textarea { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; resize: none; font-size: 14px; font-family: inherit; line-height: 1.4; min-height: 42px; max-height: 120px; outline: none; }
  textarea:focus { border-color: #1a1a2e; }
  button { padding: 10px 18px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; white-space: nowrap; }
  button:hover { background: #2d2d5e; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Legal &amp; Infosec Spec Coach</h1>
    <p>Prototype &middot; Describe what you&apos;re building and I&apos;ll help surface GDPR risks.</p>
  </div>
  <div class="messages" id="messages">
    <div class="msg system">New session started. Tell me what you&apos;re building.</div>
  </div>
  <div class="input-area">
    <textarea id="input" placeholder="Describe the feature or spec you're working on..." rows="1"></textarea>
    <button id="send" onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const WEBHOOK = "https://zincwork.app.n8n.cloud/webhook/test-legal-coach";
const sessionId = "chat-" + Math.random().toString(36).slice(2, 10);
const messages = document.getElementById("messages");
const input = document.getElementById("input");
const btn = document.getElementById("send");

function addMsg(text, role) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typing";
  const s1 = document.createElement("span");
  const s2 = document.createElement("span");
  const s3 = document.createElement("span");
  div.appendChild(s1);
  div.appendChild(s2);
  div.appendChild(s3);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  input.style.height = "auto";
  addMsg(text, "user");
  btn.disabled = true;
  showTyping();

  try {
    const res = await fetch(WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "sendMessage", chatInput: text, sessionId })
    });
    const data = await res.json();
    const reply = data.output || data.text || data.message || data.chatOutput || JSON.stringify(data);
    removeTyping();
    addMsg(reply, "agent");
  } catch (err) {
    removeTyping();
    addMsg("Error connecting to agent — check the webhook is active.", "system");
  }
  btn.disabled = false;
  input.focus();
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
input.addEventListener("input", function() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
});
</script>
</body>
</html>
